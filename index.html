<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#050505;--bg2:#0c0c0c;--bg3:#141414;--bg4:#1c1c1c;--border:#1e1e1e;--border-glow:#333;--text:#eaeaea;--text-dim:#777;--text-muted:#444;--accent:#fff;--su:#ff3b3b;--ss:#00d4ff;--sc:#00ff88;--se:#ff8800;--scr:#b84dff;--modal-bg:rgba(0,0,0,.85)}
[data-theme="light"]{--bg:#f5f5f5;--bg2:#fff;--bg3:#eee;--bg4:#e0e0e0;--border:#ddd;--border-glow:#bbb;--text:#1a1a1a;--text-dim:#555;--text-muted:#999;--accent:#111;--su:#e03030;--ss:#0090cc;--sc:#00994d;--se:#cc6e00;--scr:#8833cc;--modal-bg:rgba(0,0,0,.45)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-glow);border-radius:3px}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 20px rgba(255,255,255,.04)}}
.theme-toggle{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:10px;color:var(--text-dim);letter-spacing:1px;transition:all .25s}
.theme-toggle:hover{border-color:var(--border-glow);color:var(--text)}
.theme-toggle .t-icon{font-size:14px;line-height:1}
.recurring-badge{font-size:7px;padding:2px 6px;border-radius:8px;background:rgba(184,77,255,.12);color:var(--scr);letter-spacing:.5px;font-weight:600}
.scan{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.scan::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:scanline 10s linear infinite}
.gridbg{position:fixed;inset:0;background-image:linear-gradient(rgba(128,128,128,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(128,128,128,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
[data-theme="light"] .gridbg,[data-theme="light"] .scan{display:none}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg2);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:transparent}
.logo-icon img{width:42px;height:42px;object-fit:contain}
.logo-icon::after{content:'';position:absolute;inset:-3px;border:1px solid rgba(255,255,255,.08);border-radius:11px;animation:glow 4s ease infinite}
.logo-text{font-size:14px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.logo-sub{font-size:8px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:20px}
.live{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--sc);letter-spacing:2px;text-transform:uppercase}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--sc);animation:pulse 2s ease infinite}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);letter-spacing:1px}
.pwa-banner{padding:8px 28px;background:linear-gradient(90deg,rgba(0,255,136,.06),transparent);border-bottom:1px solid rgba(0,255,136,.15);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--sc)}
.pwa-banner button{background:rgba(0,255,136,.12);border:1px solid rgba(0,255,136,.3);color:var(--sc);padding:5px 14px;border-radius:6px;font-family:'Space Grotesk';font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.nav{display:flex;gap:2px;padding:6px 24px;border-bottom:1px solid var(--border);background:var(--bg2);backdrop-filter:blur(10px)}
.nav-btn{padding:7px 14px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text-muted);font-family:'Space Grotesk';font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .25s}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.active{color:var(--accent);background:var(--bg3);border-color:var(--border-glow);box-shadow:0 0 15px rgba(255,255,255,.04)}
.main{display:flex;flex:1}
.sidebar{width:260px;border-right:1px solid var(--border);padding:20px 16px;background:var(--bg2);flex-shrink:0;overflow-y:auto}
.content{flex:1;padding:24px 28px;overflow-y:auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;transition:all .3s;animation:fadeIn .4s ease}
.card:hover{border-color:var(--border-glow)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-t{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim)}
.card-b{font-size:9px;padding:3px 10px;border-radius:16px;border:1px solid var(--border);color:var(--text-muted);letter-spacing:1px}
.pcard{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .25s}
.pcard:hover,.pcard.sel{border-color:var(--border-glow);background:var(--bg3)}
.avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;border:2px solid var(--border);position:relative;flex-shrink:0}
.avatar.on::after{content:'';position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--sc);border:2px solid var(--bg2)}
.pname{font-size:12px;font-weight:600;letter-spacing:.5px}
.prole{font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.si{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:10px;letter-spacing:.5px}
.sd{width:7px;height:7px;border-radius:3px;flex-shrink:0}
.stitle{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;transition:all .3s}
.stat:hover{border-color:var(--border-glow)}
.stat-v{font-size:20px;font-weight:700;letter-spacing:-1px;margin-bottom:2px}
.stat-l{font-size:8px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase}
.alert{padding:10px 14px;border-radius:10px;border:1px solid;margin-bottom:10px;display:flex;align-items:center;gap:9px;font-size:11px;animation:fadeIn .3s ease}
.alert-ok{border-color:rgba(0,255,136,.25);background:rgba(0,255,136,.04);color:var(--sc)}
.calgrid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.calh{background:var(--bg3);padding:8px 4px;text-align:center;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.calh.today{color:var(--accent)}
.calh.today::after{content:'';display:block;margin:4px auto 0;width:16px;height:2px;background:var(--accent);border-radius:1px}
.calt{background:var(--bg2);padding:0 4px;display:flex;align-items:flex-start;justify-content:center;padding-top:2px;font-family:'JetBrains Mono';font-size:8px;color:var(--text-muted);height:32px}
.calc{background:var(--bg);height:32px;position:relative;cursor:pointer;transition:background .15s}
.calc:hover{background:var(--bg3)}
.calev{position:absolute;left:1px;right:1px;border-radius:3px;padding:1px 4px;font-size:7px;font-weight:500;letter-spacing:.2px;overflow:hidden;cursor:pointer;transition:all .15s;z-index:2;border-left:2px solid;white-space:nowrap;text-overflow:ellipsis}
.calev:hover{transform:scale(1.03);z-index:3}
.calev.unavailable{background:rgba(255,59,59,.1);color:var(--su);border-left-color:var(--su)}
.calev.solo{background:rgba(0,212,255,.1);color:var(--ss);border-left-color:var(--ss)}
.calev.collab{background:rgba(0,255,136,.1);color:var(--sc);border-left-color:var(--sc)}
.calev.external{background:rgba(255,136,0,.1);color:var(--se);border-left-color:var(--se)}
.calev.creative{background:rgba(184,77,255,.1);color:var(--scr);border-left-color:var(--scr)}
.calev .ev-owner{font-size:7px;opacity:.7;margin-left:2px}

/* TODOS - TAB SYSTEM */
.todo-tabs{display:flex;gap:4px;margin-bottom:20px}
.todo-tab{flex:1;padding:14px;border-radius:10px;border:2px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:10px}
.todo-tab:hover{border-color:var(--border-glow)}
.todo-tab.active-t{border-color:var(--ss);background:rgba(0,212,255,.04)}
.todo-tab.active-k{border-color:var(--scr);background:rgba(184,77,255,.04)}
.todo-tab .tab-name{font-size:14px;font-weight:700;letter-spacing:.5px}
.todo-tab .tab-count{font-family:'JetBrains Mono';font-size:11px;color:var(--text-muted);margin-left:auto}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;transition:all .25s;animation:slideR .3s ease;position:relative}
.todo-item:hover{border-color:var(--border-glow);background:rgba(255,255,255,.01)}
.todo-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border-glow);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;margin-top:1px}
.todo-check.done{background:var(--accent);border-color:var(--accent)}
.todo-check.done::after{content:'\2713';color:var(--bg);font-size:11px;font-weight:700}
.todo-body{flex:1;min-width:0}
.todo-text{font-size:13px;letter-spacing:.2px;line-height:1.4}
.todo-text.done{text-decoration:line-through;color:var(--text-muted)}
.todo-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.todo-tag{font-size:8px;padding:2px 8px;border-radius:10px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.todo-tag.high{background:rgba(255,59,59,.12);color:var(--su)}
.todo-tag.medium{background:rgba(255,136,0,.12);color:var(--se)}
.todo-tag.low{background:rgba(0,212,255,.12);color:var(--ss)}
.todo-tag.proj{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid var(--border)}
.todo-actions{display:flex;gap:4px;flex-shrink:0}
.todo-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.todo-btn:hover{background:var(--bg4);border-color:var(--border-glow);color:var(--text)}
.todo-btn.sched:hover{color:var(--sc);border-color:rgba(0,255,136,.3)}
.todo-btn.del:hover{color:var(--su);border-color:rgba(255,59,59,.3)}
.todo-item.overdue{border-color:rgba(255,59,59,.5);background:rgba(255,59,59,.04);animation:pulse 2s ease infinite}
.todo-item.dragging{opacity:.4;border-color:var(--ss)}
.todo-item.drag-over{border-color:var(--ss);box-shadow:0 -2px 0 var(--ss)}
.drag-grip{cursor:grab;color:var(--text-muted);font-size:14px;letter-spacing:-2px;padding:0 4px;user-select:none;flex-shrink:0;display:flex;align-items:center}
.drag-grip:active{cursor:grabbing}
.todo-text{cursor:text}
.subtasks-list{margin-top:8px;padding-left:10px;border-left:2px solid var(--border)}
.subtask-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px}
.subtask-check{width:14px;height:14px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.subtask-check.done{background:var(--sc);border-color:var(--sc)}
.subtask-check.done::after{content:'\2713';color:var(--bg);font-size:9px;font-weight:700}
.subtask-text{flex:1;color:var(--text)}
.subtask-text.done{text-decoration:line-through;color:var(--text-muted)}
.notif-banner{padding:8px 28px;background:linear-gradient(90deg,rgba(0,212,255,.08),transparent);border-bottom:1px solid rgba(0,212,255,.2);font-size:11px;color:var(--ss);display:flex;align-items:center;gap:8px;animation:fadeIn .3s ease}
.notif-banner button{background:none;border:none;color:var(--ss);cursor:pointer;font-size:14px;padding:0;margin-left:auto}
.add-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.input{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:'Space Grotesk';font-size:12px;outline:none;transition:border-color .25s}
.input:focus{border-color:var(--border-glow);box-shadow:0 0 12px rgba(255,255,255,.03)}
.input::placeholder{color:var(--text-muted)}
select.input{cursor:pointer;-webkit-appearance:none}
.btn{padding:9px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-family:'Space Grotesk';font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .25s}
.btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:9px}
.btn-pr{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-pr:hover{background:transparent;color:var(--accent)}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.slot{padding:14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .3s}
.slot:hover{border-color:var(--sc);box-shadow:0 0 20px rgba(0,255,136,.06)}
.slot-day{font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.slot-time{font-family:'JetBrains Mono';font-size:15px;font-weight:600;margin-bottom:5px}
.slot-badge{display:inline-block;font-size:8px;padding:3px 8px;border-radius:10px;letter-spacing:1px;text-transform:uppercase}
.slot-badge.avail{background:rgba(0,255,136,.1);color:var(--sc)}
.tr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.tr-row:last-child{border-bottom:none}
.tr-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.tr-fill{height:100%;border-radius:3px;transition:width .5s ease}
.tr-lbl{font-size:10px;width:90px;color:var(--text-dim)}
.tr-val{font-family:'JetBrains Mono';font-size:10px;width:35px;text-align:right}
.moverlay{position:fixed;inset:0;background:var(--modal-bg);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;width:480px;max-width:92vw;box-shadow:0 0 60px rgba(0,0,0,.6)}
.modal-title{font-size:15px;font-weight:700;letter-spacing:1px;margin-bottom:18px}
.mrow{margin-bottom:12px}
.mlbl{font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.mactions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.done-section{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.done-title{font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
@media(max-width:900px){
  .topbar{padding:8px 12px}
  .logo-icon{width:32px;height:32px}.logo-icon img{width:32px;height:32px}
  .logo-text{font-size:12px;letter-spacing:3px}.logo-sub{font-size:7px}
  .topbar-r{gap:10px}.live{font-size:8px;gap:4px}.clock{font-size:10px}
  .nav{padding:6px 10px;gap:1px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav-btn{padding:7px 12px;font-size:10px;white-space:nowrap;flex-shrink:0}
  .main{flex-direction:column;position:relative}
  .sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;z-index:200;transform:translateX(-100%);transition:transform .3s ease;border-right:1px solid var(--border);border-bottom:none;overflow-y:auto;background:var(--bg2)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
  .sidebar-overlay.open{display:block}
  .menu-toggle{display:flex !important;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;cursor:pointer;flex-shrink:0}
  .sidebar-close{display:flex !important;position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;align-items:center;justify-content:center;cursor:pointer;z-index:5}
  .content{padding:10px 12px}
  .stats{grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
  .stat{padding:12px 8px}.stat-v{font-size:20px}.stat-l{font-size:8px}
  .pwa-banner{padding:6px 12px;font-size:10px}.pwa-banner button{padding:4px 10px;font-size:9px}
  .cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
  .cal-scroll::-webkit-scrollbar{display:none}
  .calgrid{min-width:600px;font-size:8px;grid-template-columns:50px repeat(7,1fr)}
  .calh{padding:6px 3px;font-size:7px}.calt{font-size:7px;height:28px;padding:0 2px}
  .calc{height:28px}.calev{font-size:6px;padding:1px 2px}
  .card{padding:12px;margin-bottom:10px}
  .slots{grid-template-columns:repeat(2,1fr);gap:6px}
  .slot{padding:10px}.slot-time{font-size:13px}
  .todo-tabs{gap:3px;margin-bottom:12px}.todo-tab{padding:10px;gap:6px}
  .todo-tab .tab-name{font-size:12px}.todo-tab .tab-count{font-size:10px}
  .todo-item{padding:10px;gap:8px}.todo-text{font-size:12px}
  .add-bar{gap:4px}.input{padding:7px 10px;font-size:11px}.btn{padding:7px 12px;font-size:10px}
  .modal{padding:20px;width:95vw}
  .alert{padding:8px 10px;font-size:10px}
}
@media(min-width:901px){
  .menu-toggle,.sidebar-close,.sidebar-overlay{display:none !important}
}

function useSyncedState(key,initial){
  const[state,setState]=useState(initial);
  const localRef=useRef(false);
  const initialized=useRef(false);
  useEffect(()=>{
    const ref=fbDb.ref(key);
    ref.on('value',(snap)=>{
      const val=snap.val();
      if(val!==null){
        setState(val);
      }else if(!initialized.current){
        // First time: seed Firebase with initial data
        ref.set(initial);
      }
      initialized.current=true;
    });
    return()=>ref.off('value');
  },[key]);
  const setSynced=useCallback((updater)=>{
    setState(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      fbDb.ref(key).set(next);
      return next;
    });
  },[key]);
  return[state,setSynced];
}

function Clock(){
  const[t,setT]=useState(new Date());
  useEffect(()=>{const iv=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(iv)},[]);
  const f=n=>String(n).padStart(2,'0');
  return <span className="clock">{f(t.getHours())}:{f(t.getMinutes())}:{f(t.getSeconds())}</span>;
}

function App(){
  const[tab,setTab]=useState('dashboard');
  const[events,setEvents]=useSyncedState(STORAGE_EVENTS_KEY,IE);
  const[todos,setTodos]=useSyncedState(STORAGE_TODOS_KEY,IT);
  const[selUser,setSelUser]=useState('all');
  const[showModal,setShowModal]=useState(null);
  const[selEvent,setSelEvent]=useState(null);
  const[schedTodo,setSchedTodo]=useState(null);
  const[newEv,setNewEv]=useState({title:'',day:0,start:9,end:10,status:'solo',owner:'titouan',date:''});
  const[schedEv,setSchedEv]=useState({day:0,start:9,end:10,status:'solo'});
  const[newTodo,setNewTodo]=useState('');
  const[newPri,setNewPri]=useState('medium');
  const[newProj,setNewProj]=useState('General');
  const[newTodoDay,setNewTodoDay]=useState('');
  const[newTodoStart,setNewTodoStart]=useState('');
  const[newTodoEnd,setNewTodoEnd]=useState('');
  const[newRecur,setNewRecur]=useState('none');
  const[showAddTodo,setShowAddTodo]=useState(false);
  const[calView,setCalView]=useState('week');
  const[showPwa,setShowPwa]=useState(true);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[todoView,setTodoView]=useState('titouan');
  const[editingTodo,setEditingTodo]=useState(null);
  const[editText,setEditText]=useState('');
  const[dragId,setDragId]=useState(null);
  const[dragOverId,setDragOverId]=useState(null);
  const[expandedTodo,setExpandedTodo]=useState(null);
  const[newSubtext,setNewSubtext]=useState('');
  const[notifs,setNotifs]=useSyncedState('sbas_notifs',[]);

  // OUTREACH STATE
  const[orStep,setOrStep]=useState(0);
  const[orName,setOrName]=useState('');
  const[orChecks,setOrChecks]=useState([false,false,false,false]);
  const[orNotes,setOrNotes]=useState(['','','','']);(name), is it just me or is the algorithm doing you dirty? Your reach has dropped significantly on your latest reels. I put together a quick video showing what I'd change on your setup, wanna see it? Just say ok
  const[orBlocs,setOrBlocs]=useState([false,false,false,false]);
  const[orFree,setOrFree]=useState('');
  const[orClose,setOrClose]=useState('');
  const orTemplates=[
    `[Name], is it just me or is the algorithm doing you dirty? Your reach has dropped significantly on your latest reels. Are you sure your team is managing multiple accounts for you in the backend or are they simply falling short?`,
    `Hey [Name], u should try running only the OF link in Linkme for a bit. We 10x'd the click rate for another model doing that. Would love to send a quick video of some easy improvements for your setup if u want? Just drop a yes`,
    `[Name] be careful with the Amazon wishlist you put in your OF bio coz Amazon is now revealing your address to anyone buying you something!\nAlso i saw a few points you could improve on your IG/OF setup, do you want me to make a quick vid to show you?`,
    `Hey [Name], not gonna hit you with some copy paste pitch. I looked at your page and I think you could be making way more with your fanbase. I put together a quick video showing what I'd change on your setup, wanna see it? Just say ok`
  ];
  const orGoStep=(s)=>{setOrStep(s);};
  const orToggleCheck=(i)=>{setOrChecks(p=>{const n=[...p];n[i]=!n[i];return n;});};
  const orToggleBloc=(i)=>{setOrBlocs(p=>{const n=[...p];n[i]=!n[i];return n;});};
  const orSetNote=(i,v)=>{setOrNotes(p=>{const n=[...p];n[i]=v;return n;});};
  const orCopyTpl=(i,btn)=>{
    const name=orName||'[Name]';
    const t=orTemplates[i].replace(/\[Name\]/g,name);
    navigator.clipboard.writeText(t).then(()=>{btn.textContent='\u2713';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},1200);});
  };
  const orBuildFinal=()=>{
    const name=orName||'[Name]';
    let parts=[];
    orBlocs.forEach((sel,i)=>{if(sel)parts.push(orTemplates[i].replace(/\[Name\]/g,name));});
    if(orFree.trim())parts.push(orFree.trim());
    if(orClose)parts.push(orClose);
    return parts.length?parts.join('\n\n'):'';
  };
  const orCopyFinal=()=>{
    const t=orBuildFinal();
    if(!t)return;
    navigator.clipboard.writeText(t);
  };
  const orReset=()=>{setOrStep(0);setOrName('');setOrChecks([false,false,false,false]);setOrNotes(['','','','']);setOrBlocs([false,false,false,false]);setOrFree('');setOrClose('');};

  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('sbas_theme')||'dark'}catch(e){return'dark'}});
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);try{localStorage.setItem('sbas_theme',theme)}catch(e){}},[theme]);
  const toggleTheme=()=>setTheme(prev=>prev==='dark'?'light':'dark');

  const todayIdx=useMemo(()=>{const d=new Date().getDay();return d===0?6:d-1},[]);
  const filtEv=useMemo(()=>selUser==='all'?events:events.filter(e=>e.owner===selUser),[events,selUser]);

  const collabSlots=useMemo(()=>{
    const slots=[];
    for(let d=0;d<7;d++){for(let h=0;h<24;h++){
      const tB=events.some(e=>e.owner==='titouan'&&e.day===d&&h>=e.start&&h<e.end);
      const kB=events.some(e=>e.owner==='keda'&&e.day===d&&h>=e.start&&h<e.end);
      if(!tB&&!kB)slots.push({day:d,hour:h});
    }}
    const grouped=[];let cur=null;
    slots.forEach(s=>{if(cur&&cur.day===s.day&&cur.eh===s.hour){cur.eh=s.hour+1}else{if(cur)grouped.push(cur);cur={day:s.day,sh:s.hour,eh:s.hour+1}}});
    if(cur)grouped.push(cur);
    return grouped.filter(g=>g.eh-g.sh>=1);
  },[events]);

  const stats=useMemo(()=>{
    const tH=Math.round(events.filter(e=>e.owner==='titouan'&&e.status!=='unavailable').reduce((s,e)=>s+(e.end-e.start),0)*10)/10;
    const kH=Math.round(events.filter(e=>e.owner==='keda'&&e.status!=='unavailable').reduce((s,e)=>s+(e.end-e.start),0)*10)/10;
    const cH=Math.round(events.filter(e=>e.status==='collab').reduce((s,e)=>s+(e.end-e.start),0)*10)/10;
    const tDone=todos.filter(t=>t.done).length;
    const tSched=todos.filter(t=>t.scheduled).length;
    return{tH,kH,cH,tDone,tTotal:todos.length,tSched};
  },[events,todos]);

  const hasConflict=(owner,day,start,end)=>events.some(e=>e.owner===owner&&e.day===day&&((start>=e.start&&start<e.end)||(end>e.start&&end<=e.end)||(start<=e.start&&end>=e.end)));

  const addEvent=()=>{
    if(hasConflict(newEv.owner,newEv.day,newEv.start,newEv.end)){alert('CONFLIT - Ce creneau chevauche un evenement existant.');return;}
    setEvents(prev=>[...prev,{...newEv,id:Date.now()}]);
    setShowModal(null);
    setNewEv({title:'',day:0,start:9,end:10,status:'solo',owner:'titouan',date:''});
  };

  const scheduleTask=()=>{
    if(!schedTodo)return;
    if(hasConflict(schedTodo.owner,schedEv.day,schedEv.start,schedEv.end)){alert('CONFLIT - Creneau deja occupe.');return;}
    setEvents(prev=>[...prev,{id:Date.now(),day:schedEv.day,start:schedEv.start,end:schedEv.end,title:schedTodo.text,status:schedEv.status,owner:schedTodo.owner,date:''}]);
    setTodos(prev=>prev.map(t=>t.id===schedTodo.id?{...t,scheduled:{day:schedEv.day,start:schedEv.start,end:schedEv.end}}:t));
    setShowModal(null);setSchedTodo(null);
  };

  const toggleTodo=id=>setTodos(prev=>prev.map(t=>{
    if(t.id!==id)return t;
    const nowDone=!t.done;
    if(nowDone&&t.recurrence){
      const newId=Date.now()+Math.random()*1000|0;
      setTimeout(()=>setTodos(p=>[...p,{id:newId,text:t.text,done:false,priority:t.priority,owner:t.owner,project:t.project,scheduled:t.scheduled,subtasks:[],recurrence:t.recurrence,lastRecreated:Date.now()}]),500);
    }
    return{...t,done:nowDone};
  }));
  const deleteTodo=id=>{
    const todo=todos.find(t=>t.id===id);
    if(todo&&todo.scheduled){setEvents(prev=>prev.filter(e=>!(e.title===todo.text&&e.owner===todo.owner)));}
    setTodos(prev=>prev.filter(t=>t.id!==id));
  };
  const addTodo=()=>{
    if(!newTodo.trim())return;
    const tid=Date.now();
    const wantSchedule=newTodoDay!==''&&newTodoStart!==''&&newTodoEnd!=='';
    let sched=null;
    if(wantSchedule){
      const day=+newTodoDay,st=+newTodoStart,en=+newTodoEnd;
      if(hasConflict(todoView,day,st,en)){alert('CONFLIT - Ce creneau est deja pris.');return;}
      sched={day,start:st,end:en};
      setEvents(ev=>[...ev,{id:tid+1,day,start:st,end:en,title:newTodo,status:'solo',owner:todoView,date:''}]);
    }
    const recurrence=newRecur!=='none'?newRecur:null;
    setTodos(prev=>[...prev,{id:tid,text:newTodo,done:false,priority:newPri,owner:todoView,project:newProj,scheduled:sched,subtasks:[],recurrence,lastRecreated:null}]);
    setNotifs(prev=>[...prev,{id:Date.now(),for:todoView,text:newTodo,from:todoView==='titouan'?'Titouan a assigne':'Keda a assigne',ts:Date.now()}]);
    setNewTodo('');setNewTodoDay('');setNewTodoStart('');setNewTodoEnd('');setNewRecur('none');
  };
  const openSchedule=(todo)=>{setSchedTodo(todo);setSchedEv({day:2,start:9,end:10,status:'solo'});setShowModal('schedule');};
  const startEdit=(t)=>{setEditingTodo(t.id);setEditText(t.text);};
  const saveEdit=(id)=>{if(editText.trim()){setTodos(prev=>prev.map(t=>t.id===id?{...t,text:editText}:t));}setEditingTodo(null);};
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);};
  const onDragOver=(e,id)=>{e.preventDefault();e.dataTransfer.dropEffect='move';if(id!==dragOverId)setDragOverId(id);};
  const onDragEnd=()=>{setDragId(null);setDragOverId(null);};
  const onDrop=(e,targetId)=>{e.preventDefault();if(!dragId||dragId===targetId)return onDragEnd();setTodos(prev=>{const ownerTodos=prev.filter(t=>t.owner===todoView&&!t.done);const otherTodos=prev.filter(t=>t.owner!==todoView||t.done);const fromIdx=ownerTodos.findIndex(t=>t.id===dragId);const toIdx=ownerTodos.findIndex(t=>t.id===targetId);if(fromIdx<0||toIdx<0)return prev;const arr=[...ownerTodos];const[moved]=arr.splice(fromIdx,1);arr.splice(toIdx,0,moved);return[...arr,...otherTodos];});onDragEnd();};
  const toggleExpand=(id)=>setExpandedTodo(prev=>prev===id?null:id);
  const addSubtask=(todoId,text)=>{if(!text.trim())return;setTodos(prev=>prev.map(t=>t.id===todoId?{...t,subtasks:[...(t.subtasks||[]),{id:Date.now(),text,done:false}]}:t));};
  const toggleSubtask=(todoId,subId)=>setTodos(prev=>prev.map(t=>t.id===todoId?{...t,subtasks:(t.subtasks||[]).map(s=>s.id===subId?{...s,done:!s.done}:s)}:t));
  const deleteSubtask=(todoId,subId)=>setTodos(prev=>prev.map(t=>t.id===todoId?{...t,subtasks:(t.subtasks||[]).filter(s=>s.id!==subId)}:t));
  const isOverdue=(t)=>{if(!t.scheduled||t.done)return false;const now=new Date();const curDay=((now.getDay()+6)%7);const curTime=now.getHours()+now.getMinutes()/60;if(curDay>t.scheduled.day)return true;if(curDay===t.scheduled.day&&curTime>t.scheduled.end)return true;return false;};
  const deleteEvent=(id)=>{setEvents(prev=>prev.filter(e=>e.id!==id));setSelEvent(null);setShowModal(null);};
  const openEventDetail=(ev)=>{setSelEvent(ev);setShowModal('detail');};

  const curTodos=todos.filter(t=>t.owner===todoView);
  const activeTodos=curTodos.filter(t=>!t.done);
  const doneTodos=curTodos.filter(t=>t.done);

  return(
  <div className="app">
    <div className="topbar">
      <div className="logo">
        <button className="menu-toggle" onClick={()=>setSidebarOpen(!sidebarOpen)} style={{display:'none'}}>&#9776;</button>
        <div className="logo-icon"><img src={"data:image/png;base64,"+LOGO_B64} alt="LCX Agency"/></div>
        <div><div className="logo-text">LCX</div><div className="logo-sub">Agency &middot; S.B.A.S.</div></div>
      </div>
      <div className="topbar-r">
        <div className="live"><span className="live-dot"></span>ACTIF</div>
        <Clock/>
        <button className="theme-toggle" onClick={toggleTheme}><span className="t-icon">{theme==='dark'?'\u2600':'\u263E'}</span>{theme==='dark'?'Clair':'Sombre'}</button>
      </div>
    </div>

    {showPwa&&(<div className="pwa-banner">
      <span>Installe S.B.A.S. comme app &rarr; Chrome &rarr; &#8942; &rarr; "Installer l'application"</span>
      <button onClick={()=>setShowPwa(false)}>OK</button>
    </div>)}

    {notifs.filter(n=>Date.now()-n.ts<10000).map(n=>(
      <div key={n.id} className="notif-banner">
        <span>🔔</span><span><strong>{n.from}</strong> une nouvelle tache : "{n.text}"</span>
        <button onClick={()=>setNotifs(prev=>prev.filter(x=>x.id!==n.id))}>&times;</button>
      </div>
    ))}

    <div className="nav">
      {[{id:'dashboard',l:'Dashboard'},{id:'calendar',l:'Calendrier'},{id:'todos',l:'Taches'},{id:'collab',l:'Collaboration'},{id:'outreach',l:'Outreach'}].map(n=>(
        <button key={n.id} className={"nav-btn "+(tab===n.id?'active':'')} onClick={()=>setTab(n.id)}>{n.l}</button>
      ))}
    </div>

    <div className="main">
      <div className={"sidebar-overlay"+(sidebarOpen?' open':'')} onClick={()=>setSidebarOpen(false)}></div>
      <div className={"sidebar"+(sidebarOpen?' open':'')}>
        <button className="sidebar-close" onClick={()=>setSidebarOpen(false)} style={{display:'none'}}>&times;</button>
        <div className="stitle" style={{marginTop:sidebarOpen?8:0}}>Equipe</div>
        <div className={"pcard "+(selUser==='all'?'sel':'')} onClick={()=>setSelUser('all')}>
          <div className="avatar" style={{border:'2px solid #fff'}}>&#8853;</div>
          <div><div className="pname">Vue Globale</div><div className="prole">Tous</div></div>
        </div>
        <div className={"pcard "+(selUser==='titouan'?'sel':'')} onClick={()=>setSelUser('titouan')}>
          <div className="avatar on" style={{background:'linear-gradient(135deg,#0a1628,#1a2638)'}}>T</div>
          <div><div className="pname">Titouan</div><div className="prole">Co-fondateur</div></div>
        </div>
        <div className={"pcard "+(selUser==='keda'?'sel':'')} onClick={()=>setSelUser('keda')}>
          <div className="avatar on" style={{background:'linear-gradient(135deg,#1a0a28,#2a1a38)'}}>K</div>
          <div><div className="pname">Keda</div><div className="prole">Associe &middot; Manager</div></div>
        </div>
        <div style={{marginTop:24}}>
          <div className="stitle">Statuts</div>
          {STATUSES.map(s=>(<div key={s.id} className="si"><span className="sd" style={{background:s.color}}></span>{s.label}</div>))}
        </div>
        <div style={{marginTop:24}}>
          <div className="stitle">Actions</div>
          <button className="btn" style={{width:'100%',marginBottom:6}} onClick={()=>{setShowModal('event');setNewEv({title:'',day:0,start:9,end:10,status:'solo',owner:'titouan',date:''})}}>+ Evenement</button>
          <button className="btn" style={{width:'100%',marginBottom:6}} onClick={()=>setTab('todos')}>Taches</button>
        </div>
        <div style={{marginTop:24}}>
          <div className="stitle">Stats</div>
          <div className="si" style={{justifyContent:'space-between'}}><span>Planifiees</span><span style={{fontFamily:"'JetBrains Mono'",color:'var(--sc)'}}>{stats.tSched}/{stats.tTotal}</span></div>
          <div className="si" style={{justifyContent:'space-between'}}><span>Collab</span><span style={{fontFamily:"'JetBrains Mono'",color:'var(--sc)'}}>{stats.cH}h</span></div>
          <div className="si" style={{justifyContent:'space-between'}}><span>Terminees</span><span style={{fontFamily:"'JetBrains Mono'",color:'var(--text-dim)'}}>{stats.tDone}/{stats.tTotal}</span></div>
        </div>
      </div>

      <div className="content">

        {/* DASHBOARD */}
        {tab==='dashboard'&&(
        <div className="tab-c">
          <div className="stats">
            <div className="stat"><div className="stat-v">{stats.tH}h</div><div className="stat-l">Titouan</div></div>
            <div className="stat"><div className="stat-v">{stats.kH}h</div><div className="stat-l">Keda</div></div>
            <div className="stat"><div className="stat-v" style={{color:'var(--sc)'}}>{stats.cH}h</div><div className="stat-l">Collab</div></div>
            <div className="stat"><div className="stat-v">{stats.tDone}/{stats.tTotal}</div><div className="stat-l">Taches OK</div></div>
          </div>
          <div className="card">
            <div className="card-h"><span className="card-t">Taches Prioritaires</span><button className="btn btn-sm" onClick={()=>setTab('todos')}>Tout Voir</button></div>
            {todos.filter(t=>!t.done).slice(0,5).map(t=>(
              <div key={t.id} className="todo-item">
                <div className={"todo-check "+(t.done?'done':'')} onClick={()=>toggleTodo(t.id)}></div>
                <div className="todo-body">
                  <div className="todo-text">{t.text}</div>
                  <div className="todo-meta">
                    <span className={"todo-tag "+t.priority}>{t.priority}</span>
                    <span className="todo-tag proj">{t.project}</span>
                    <span style={{fontSize:8,color:'var(--text-muted)'}}>{t.owner==='titouan'?'Titouan':'Keda'}</span>
                    {t.scheduled&&<span style={{fontSize:8,color:'var(--sc)'}}>&#128197; {FDAYS[t.scheduled.day]} {t.scheduled.start}h</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>)}

        {/* CALENDAR */}
        {tab==='calendar'&&(
        <div className="tab-c">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{display:'flex',gap:6}}>
              <button className={"btn btn-sm "+(calView==='week'?'btn-pr':'')} onClick={()=>setCalView('week')}>Semaine</button>
              <button className={"btn btn-sm "+(calView==='month'?'btn-pr':'')} onClick={()=>setCalView('month')}>Mois</button>
            </div>
            <button className="btn btn-sm" onClick={()=>{setShowModal('event');setNewEv({title:'',day:0,start:9,end:10,status:'solo',owner:'titouan',date:''})}}>+ Evenement</button>
          </div>
          {calView==='week'&&(
            <div className="cal-scroll"><div className="calgrid">
              <div className="calh"></div>
              {DAYS.map((d,i)=><div key={d} className={"calh "+(i===todayIdx?'today':'')}>{d}</div>)}
              {HOURS.map(h=>(
                <React.Fragment key={h}>
                  <div className="calt">{h}:00</div>
                  {DAYS.map((_,d)=>(
                    <div key={d+'-'+h} className="calc">
                      {filtEv.filter(e=>e.day===d&&Math.floor(e.start)===h).map(e=>(
                        <div key={e.id} className={"calev "+e.status} style={{top:(e.start-h)*100+'%',height:(e.end-e.start)*32+'px'}} title={e.title+' ('+( e.owner==='titouan'?'Titouan':'Keda')+')'} onClick={()=>openEventDetail(e)}>
                          {e.title}<span className="ev-owner">{e.owner==='titouan'?' T':' K'}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </React.Fragment>
              ))}
            </div></div>

          {calView==='month'&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,background:'var(--border)',borderRadius:12,overflow:'hidden',border:'1px solid var(--border)'}}>
              {DAYS.map(d=><div key={d} className="calh">{d}</div>)}
              {Array.from({length:35},(_,i)=>{const dn=i-2;const ok=dn>=0&&dn<30;const devs=ok?events.filter(e=>e.day===(dn%7)):[];
                return(<div key={i} style={{background:'var(--bg)',padding:6,minHeight:70,opacity:ok?1:.25}}>
                  <div style={{fontSize:11,fontWeight:600,marginBottom:3,color:ok?'var(--text)':'var(--text-muted)'}}>{ok?dn+1:''}</div>
                  {devs.slice(0,3).map((e,j)=>{const st=STATUSES.find(s=>s.id===e.status);return(
                    <div key={j} style={{fontSize:7,padding:'1px 3px',borderRadius:2,marginBottom:1,background:(st?st.color:'#fff')+'15',color:st?st.color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {e.owner==='titouan'?'T':'K'} {e.title}
                    </div>
                  )})}
                </div>);
              })}
            </div>
          )}
        </div>)}

        {/* TODOS - SEPARATED TABS */}
        {tab==='todos'&&(
        <div className="tab-c">
          <div className="todo-tabs">
            <div className={"todo-tab "+(todoView==='titouan'?'active-t':'')} onClick={()=>setTodoView('titouan')}>
              <div className="avatar on" style={{width:30,height:30,fontSize:12,background:'linear-gradient(135deg,#0a1628,#1a2638)'}}>T</div>
              <div className="tab-name">Titouan</div>
              <div className="tab-count">{todos.filter(t=>t.owner==='titouan'&&!t.done).length} actives</div>
            </div>
            <div className={"todo-tab "+(todoView==='keda'?'active-k':'')} onClick={()=>setTodoView('keda')}>
              <div className="avatar on" style={{width:30,height:30,fontSize:12,background:'linear-gradient(135deg,#1a0a28,#2a1a38)'}}>K</div>
              <div className="tab-name">Keda</div>
              <div className="tab-count">{todos.filter(t=>t.owner==='keda'&&!t.done).length} actives</div>
            </div>
          </div>

          <button className="btn btn-pr" style={{width:'100%',marginBottom:16,padding:'10px 0'}} onClick={()=>setShowAddTodo(true)}>+ Nouvelle tache</button>

          {activeTodos.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>Aucune tache active pour {todoView==='titouan'?'Titouan':'Keda'}</div>}

          {activeTodos.map(t=>(
            <div key={t.id} className={"todo-item"+(isOverdue(t)?" overdue":"")+(dragId===t.id?" dragging":"")+(dragOverId===t.id&&dragId!==t.id?" drag-over":"")} draggable={editingTodo!==t.id} onDragStart={e=>onDragStart(e,t.id)} onDragOver={e=>onDragOver(e,t.id)} onDragEnd={onDragEnd} onDrop={e=>onDrop(e,t.id)}>
              <div className="drag-grip" title="Glisser pour deplacer">⠗</div>
              <div className="todo-check" onClick={()=>toggleTodo(t.id)}></div>
              <div className="todo-body">
                {editingTodo===t.id?(
                  <input className="input" style={{flex:1,marginBottom:6}} value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveEdit(t.id);if(e.key==='Escape')setEditingTodo(null);}} onBlur={()=>saveEdit(t.id)} autoFocus/>
                ):(
                  <div className="todo-text" onClick={()=>startEdit(t)}>{t.text}</div>
                )}
                <div className="todo-meta">
                  <span className={"todo-tag "+t.priority}>{t.priority}</span>
                  <span className="todo-tag proj">{t.project}</span>
                  {t.scheduled&&<span style={{fontSize:8,color:'var(--sc)'}}>&#128197; {FDAYS[t.scheduled.day]} {fmtTime(t.scheduled.start)}&mdash;{fmtTime(t.scheduled.end)}</span>}
                  {t.recurrence&&<span className="recurring-badge">{t.recurrence==='daily'?'Quotidien':t.recurrence==='weekly'?'Hebdo':'Mensuel'}</span>}
                  {isOverdue(t)&&<span style={{fontSize:8,color:'var(--su)',fontWeight:600}}>EN RETARD</span>}
                </div>
                {expandedTodo===t.id&&(
                  <div className="subtasks-list">
                    {(t.subtasks||[]).map(s=>(
                      <div key={s.id} className="subtask-item">
                        <div className={"subtask-check"+(s.done?" done":"")} onClick={()=>toggleSubtask(t.id,s.id)}></div>
                        <div className={"subtask-text"+(s.done?" done":"")}>{s.text}</div>
                        <button className="todo-btn" style={{width:20,height:20,fontSize:10}} onClick={()=>deleteSubtask(t.id,s.id)}>&times;</button>
                      </div>
                    ))}
                    <div style={{display:'flex',gap:6,marginTop:8}}>
                      <input className="input" style={{flex:1,fontSize:11}} placeholder="Ajouter sous-tache..." value={newSubtext} onChange={e=>setNewSubtext(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){addSubtask(t.id,newSubtext);setNewSubtext('');}}}/>
                      <button className="btn btn-sm" onClick={()=>{addSubtask(t.id,newSubtext);setNewSubtext('');}}>+</button>
                    </div>
                  </div>
                )}
              </div>
              <div className="todo-actions">
                <button className="todo-btn" title="Sous-taches" onClick={()=>toggleExpand(t.id)}>{expandedTodo===t.id?'▾':'▸'}</button>
                <button className="todo-btn sched" title="Planifier" onClick={()=>openSchedule(t)}>&#128197;</button>
                <button className="todo-btn del" title="Supprimer" onClick={()=>deleteTodo(t.id)}>&times;</button>
              </div>
            </div>
          ))}

          {doneTodos.length>0&&(
            <div className="done-section">
              <div className="done-title">Terminees ({doneTodos.length})</div>
              {doneTodos.map(t=>(
                <div key={t.id} className="todo-item" style={{opacity:.45}}>
                  <div className="todo-check done" onClick={()=>toggleTodo(t.id)}></div>
                  <div className="todo-body"><div className="todo-text done">{t.text}</div></div>
                  <div className="todo-actions"><button className="todo-btn del" onClick={()=>deleteTodo(t.id)}>&times;</button></div>
                </div>
              ))}
            </div>
          )}

          <div className="card" style={{marginTop:20}}>
            <div className="card-h"><span className="card-t">Progression Projets &mdash; {todoView==='titouan'?'Titouan':'Keda'}</span></div>
            {['Sales','Marketing','Produit','Levee de fonds','Legal','Operations'].map((p,i)=>{
              const total=todos.filter(t=>t.owner===todoView&&t.project===p).length;
              if(!total)return null;
              const done=todos.filter(t=>t.owner===todoView&&t.project===p&&t.done).length;
              const pct=Math.round((done/total)*100);
              const colors=['#00d4ff','#00ff88','#b84dff','#ff8800','#ff3b3b','#777'];
              return(<div key={p} className="tr-row"><span className="tr-lbl">{p}</span><div className="tr-bg"><div className="tr-fill" style={{width:pct+'%',background:colors[i%colors.length]}}></div></div><span className="tr-val">{pct}%</span></div>);
            })}
          </div>
        </div>)}

        {/* COLLAB */}
        {tab==='collab'&&(
        <div className="tab-c">
          <div className="card">
            <div className="card-h"><span className="card-t">Analyse Collaboration</span></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10,textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:700,color:'var(--sc)'}}>MER</div>
                <div style={{fontSize:9,color:'var(--text-muted)',marginTop:3}}>MEILLEUR JOUR</div>
              </div>
              <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10,textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:700,color:'var(--ss)'}}>9h&mdash;12h</div>
                <div style={{fontSize:9,color:'var(--text-muted)',marginTop:3}}>PLAGE OPTIMALE</div>
              </div>
              <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10,textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:700,color:'var(--scr)'}}>~{stats.cH}h</div>
                <div style={{fontSize:9,color:'var(--text-muted)',marginTop:3}}>PAR SEMAINE</div>
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-h"><span className="card-t">Historique Collab</span></div>
            {['Semaine en cours','Semaine -1','Semaine -2','Semaine -3'].map((w,i)=>{
              const hrs=[stats.cH,3,5,4][i];
              return(<div key={w} className="tr-row"><span className="tr-lbl">{w}</span><div className="tr-bg"><div className="tr-fill" style={{width:hrs*12+'%',background:'var(--sc)'}}></div></div><span className="tr-val">{hrs}h</span></div>);
            })}
          </div>
        </div>)}

        {tab==='outreach'&&(
        <div className="tab-c">

          {/* FLOW NAV */}
          <div className="or-flow">
            {['Diagnostic','Blocs','Freestyle','Close','Send'].map((label,i)=>(
              <React.Fragment key={i}>
                {i>0&&<span className="or-arrow">&rarr;</span>}
                <div className={"or-fstep"+(orStep===i?' active':'')+(orStep>i?' done':'')} onClick={()=>orGoStep(i)}>
                  <span className="fnum">{i+1}</span>{label}
                </div>
              </React.Fragment>
            ))}
          </div>

          {/* STEP 0: DIAGNOSTIC */}
          {orStep===0&&(<div style={{animation:'fadeIn .25s ease'}}>
            <div className="or-name">
              <label>Target @</label>
              <input placeholder="name or @handle" value={orName} onChange={e=>setOrName(e.target.value)}/>
            </div>
            <div className="or-sh">Phase 01 — Diagnostic</div>
            <div className="or-sd">Scan the account. Check every point. Note observations.</div>
            <div className="or-grid">
              {[
                {tag:'tr',tagL:'High Impact',title:'Reach Check',desc:'Compare latest Reels vs older ones. Visible view drop? Algorithm penalty?',ph:'Notes: views before vs now, trend...'},
                {tag:'to',tagL:'Quick Lever',title:'Funnel Check',desc:'LinkMe used? OF link alone or buried among others? Traffic leaks detected?',ph:'Notes: number of links, LinkMe structure...'},
                {tag:'tr',tagL:'Security Alert',title:'Wishlist Check',desc:'Amazon Wishlist in OF bio or LinkMe? Personal address exposure risk.',ph:'Notes: wishlist found? where exactly...'},
                {tag:'tb',tagL:'Differentiation',title:'Visual Audit',desc:'IG/OF consistency, feed quality, optimized bio, highlights, overall branding.',ph:'Notes: what stands out, quick wins...'}
              ].map((c,i)=>(
                <div key={i} className={"or-chk"+(orChecks[i]?' checked':'')} onClick={()=>orToggleCheck(i)}>
                  <div className={"or-tag "+c.tag}>{c.tagL}</div>
                  <h4>{c.title}</h4>
                  <p>{c.desc}</p>
                  <textarea placeholder={c.ph} value={orNotes[i]} onClick={e=>e.stopPropagation()} onChange={e=>orSetNote(i,e.target.value)}/>
                </div>
              ))}
            </div>
            <div className="or-statbar">Checks completed: <span className="val">{orChecks.filter(Boolean).length}</span>/4</div>
            <div className="or-nav"><div></div><button className="btn btn-pr" onClick={()=>orGoStep(1)}>Choose Blocs &rarr;</button></div>
          </div>)}

          {/* STEP 1: BLOCS */}
          {orStep===1&&(<div style={{animation:'fadeIn .25s ease'}}>
            <div className="or-sh">Phase 02 — Message Builder</div>
            <div className="or-sd">Select the blocs that match your diagnostic. Combine for a unique DM.</div>
            {[
              {icon:'📉',title:'Reach / Algorithm',sub:'When you detect a view drop'},
              {icon:'🔗',title:'Funnel / LinkMe',sub:'When the OF link is buried or unoptimized'},
              {icon:'📦',title:'Wishlist / Security',sub:'When you spot an Amazon Wishlist'},
              {icon:'👁️',title:'Image Consistency',sub:'General approach based on visual audit'}
            ].map((b,i)=>(
              <div key={i} className={"or-bloc"+(orBlocs[i]?' sel':'')} >
                <div className="or-bhead" onClick={()=>orToggleBloc(i)}>
                  <div className="or-bhead-l">
                    <div className="or-bicon">{b.icon}</div>
                    <div><h4>{b.title}</h4><div className="or-bsub">{b.sub}</div></div>
                  </div>
                  <button className="or-btog">{orBlocs[i]?'−':'+'}</button>
                </div>
                {orBlocs[i]&&(
                  <div className="or-bbody" style={{display:'block'}}>
                    <div className="or-tpl">
                      <div className="or-tpl-lbl">Template</div>
                      <button className="or-copy" onClick={e=>{e.stopPropagation();orCopyTpl(i,e.target);}}>Copy</button>
                      <div className="or-tpl-msg" dangerouslySetInnerHTML={{__html:orTemplates[i].replace(/\[Name\]/g,'<span class="v">'+(orName||'[Name]')+'</span>').replace(/\n/g,'<br/>')}}/>
                    </div>
                  </div>
                )}
              </div>
            ))}
            <div className="or-nav">
              <button className="btn" onClick={()=>orGoStep(0)}>&larr; Diagnostic</button>
              <div className="rr"><button className="btn" onClick={()=>orGoStep(2)}>Freestyle &rarr;</button><button className="btn btn-pr" onClick={()=>orGoStep(3)}>Skip to Close &rarr;</button></div>
            </div>
          </div>)}

          {/* STEP 2: FREESTYLE */}
          {orStep===2&&(<div style={{animation:'fadeIn .25s ease'}}>
            <div className="or-sh">Phase 03 — Creative Flow</div>
            <div className="or-sd">Spotted something unique? Write your message from scratch here.</div>
            <div className="or-free">
              <h4>Freestyle Zone</h4>
              <p className="hint">Structure: specific observation → value add → closed question.</p>
              <textarea placeholder={"e.g. Hey "+(orName||'[Name]')+", I noticed you post a lot of behind-the-scenes but don't highlight them — that's exactly the type of content that converts on OF..."} value={orFree} onChange={e=>setOrFree(e.target.value)}/>
              <div className="or-cc">{orFree.length} chars</div>
            </div>
            <div className="or-tips">
              <h4>Freestyle Reminders</h4>
              <p>→ Mention a SPECIFIC detail from the account (a Reel, a highlight, a post)<br/>
              → Show you spent time looking (not just skimmed)<br/>
              → Offer concrete value (audit video, actionable tip)<br/>
              → ALWAYS end with a closed question</p>
            </div>
            <div className="or-nav">
              <button className="btn" onClick={()=>orGoStep(1)}>&larr; Blocs</button>
              <button className="btn btn-pr" onClick={()=>orGoStep(3)}>Choose Closer &rarr;</button>
            </div>
          </div>)}

          {/* STEP 3: CLOSE */}
          {orStep===3&&(<div style={{animation:'fadeIn .25s ease'}}>
            <div className="or-sh">Phase 04 — Punch Final</div>
            <div className="or-sd">Write the closing question that forces a response.</div>
            <div className="or-close">
              <h4>Your Closing Question</h4>
              <p className="hint">Short, direct, easy to answer. Yes/no or one-word answers only.</p>
              <input placeholder="e.g. Wanna see it? / You handle all this solo? / Want me to send the free audit?" value={orClose} onChange={e=>setOrClose(e.target.value)}/>
            </div>
            <div className="or-nav">
              <button className="btn" onClick={()=>orGoStep(1)}>&larr; Blocs</button>
              <button className="btn btn-pr" onClick={()=>orGoStep(4)}>See Final Message &rarr;</button>
            </div>
          </div>)}

          {/* STEP 4: SEND */}
          {orStep===4&&(<div style={{animation:'fadeIn .25s ease'}}>
            <div className="or-sh">Phase 05 — Ready to Send</div>
            <div className="or-sd">Review, adjust if needed, copy and send.</div>
            <div className="or-final">
              <div className="fl">Assembled DM</div>
              <div className="fs">Your blocs + closing question combined.</div>
              <div className="or-fmsg">{orBuildFinal()||<span className="ph">Go back to previous steps to build your message...</span>}</div>
              <div style={{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}}>
                <button className="btn btn-pr" onClick={orCopyFinal}>Copy Message</button>
                <button className="btn" onClick={()=>orGoStep(0)}>New Prospect</button>
                <button className="btn" style={{color:'var(--su)',borderColor:'rgba(255,59,59,.25)'}} onClick={orReset}>Reset All</button>
              </div>
            </div>
            <div className="or-nav">
              <button className="btn" onClick={()=>orGoStep(3)}>&larr; Edit</button>
              <div></div>
            </div>
          </div>)}

        </div>)}

      </div>
    </div>

    {/* MODAL: ADD EVENT */}
    {showModal==='event'&&(
    <div className="moverlay" onClick={()=>setShowModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Nouvel Evenement</div>
        <div className="mrow"><div className="mlbl">Titre</div>
          <input className="input" style={{width:'100%'}} placeholder="Ex: Session strategie..." value={newEv.title} onChange={e=>setNewEv({...newEv,title:e.target.value})}/>
        </div>
        <div className="mrow"><div className="mlbl">Date (optionnel)</div>
          <input className="input" type="date" style={{width:'100%'}} value={newEv.date} onChange={e=>setNewEv({...newEv,date:e.target.value})}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="mrow"><div className="mlbl">Jour de la semaine</div>
            <select className="input" style={{width:'100%'}} value={newEv.day} onChange={e=>setNewEv({...newEv,day:+e.target.value})}>
              {FDAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Statut</div>
            <select className="input" style={{width:'100%'}} value={newEv.status} onChange={e=>setNewEv({...newEv,status:e.target.value})}>
              {STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Debut</div>
            <select className="input" style={{width:'100%'}} value={newEv.start} onChange={e=>setNewEv({...newEv,start:+e.target.value})}>
              {TIMES.map(t=><option key={t.val} value={t.val}>{t.label}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Fin</div>
            <select className="input" style={{width:'100%'}} value={newEv.end} onChange={e=>setNewEv({...newEv,end:+e.target.value})}>
              {TIMES.map(t=><option key={t.val} value={t.val}>{t.label}</option>)}
            </select>
          </div>
        </div>
        <div className="mrow"><div className="mlbl">Associe</div>
          <select className="input" style={{width:'100%'}} value={newEv.owner} onChange={e=>setNewEv({...newEv,owner:e.target.value})}>
            <option value="titouan">Titouan</option><option value="keda">Keda</option>
          </select>
        </div>
        <div className="mactions">
          <button className="btn" onClick={()=>setShowModal(null)}>Annuler</button>
          <button className="btn btn-pr" onClick={addEvent}>Creer</button>
        </div>
      </div>
    </div>)}

    {/* MODAL: SCHEDULE TASK */}
    {showModal==='schedule'&&schedTodo&&(
    <div className="moverlay" onClick={()=>{setShowModal(null);setSchedTodo(null)}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Planifier dans l'emploi du temps</div>
        <div className="alert alert-ok" style={{marginBottom:14}}>
          <span>&#128203;</span> {schedTodo.text}
          <span style={{marginLeft:'auto',fontSize:9,opacity:.7}}>{schedTodo.owner==='titouan'?'Titouan':'Keda'}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="mrow"><div className="mlbl">Jour</div>
            <select className="input" style={{width:'100%'}} value={schedEv.day} onChange={e=>setSchedEv({...schedEv,day:+e.target.value})}>
              {FDAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Statut</div>
            <select className="input" style={{width:'100%'}} value={schedEv.status} onChange={e=>setSchedEv({...schedEv,status:e.target.value})}>
              {STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Debut</div>
            <select className="input" style={{width:'100%'}} value={schedEv.start} onChange={e=>setSchedEv({...schedEv,start:+e.target.value})}>
              {TIMES.map(t=><option key={t.val} value={t.val}>{t.label}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Fin</div>
            <select className="input" style={{width:'100%'}} value={schedEv.end} onChange={e=>setSchedEv({...schedEv,end:+e.target.value})}>
              {TIMES.map(t=><option key={t.val} value={t.val}>{t.label}</option>)}
            </select>
          </div>
        </div>
        <div className="mactions">
          <button className="btn" onClick={()=>{setShowModal(null);setSchedTodo(null)}}>Annuler</button>
          <button className="btn btn-pr" onClick={scheduleTask}>Planifier</button>
        </div>
      </div>
    </div>)}

    {/* MODAL: EVENT DETAIL */}
    {showModal==='detail'&&selEvent&&(
    <div className="moverlay" onClick={()=>{setShowModal(null);setSelEvent(null)}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{selEvent.title}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div><div className="mlbl">Jour</div><div style={{fontSize:14,fontWeight:600}}>{FDAYS[selEvent.day]}</div></div>
          <div><div className="mlbl">Associe</div><div style={{fontSize:14,fontWeight:600}}>{selEvent.owner==='titouan'?'Titouan':'Keda'}</div></div>
          <div><div className="mlbl">Horaire</div><div style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono'"}}>{fmtTime(selEvent.start)} &mdash; {fmtTime(selEvent.end)}</div></div>
          <div><div className="mlbl">Statut</div><div style={{fontSize:13}}><span className="sd" style={{background:STATUSES.find(s=>s.id===selEvent.status)?.color,display:'inline-block',marginRight:6,verticalAlign:'middle'}}></span>{STATUSES.find(s=>s.id===selEvent.status)?.label}</div></div>
          {selEvent.date&&<div><div className="mlbl">Date</div><div style={{fontSize:14}}>{selEvent.date}</div></div>}
        </div>
        <div className="mactions">
          <button className="btn" onClick={()=>{setShowModal(null);setSelEvent(null)}}>Fermer</button>
          <button className="btn" style={{borderColor:'rgba(255,59,59,.4)',color:'#ff3b3b'}} onClick={()=>deleteEvent(selEvent.id)}>Supprimer</button>
        </div>
      </div>
    </div>)}

    {/* MODAL: ADD TODO */}
    {showAddTodo&&(
    <div className="moverlay" onClick={()=>setShowAddTodo(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Nouvelle tache &mdash; {todoView==='titouan'?'Titouan':'Keda'}</div>
        <div className="mrow"><div className="mlbl">Intitule</div>
          <input className="input" style={{width:'100%'}} placeholder="Ex: Envoyer le devis client..." value={newTodo} onChange={e=>setNewTodo(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newTodo.trim()){addTodo();setShowAddTodo(false);}}} autoFocus/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="mrow"><div className="mlbl">Priorite</div>
            <select className="input" style={{width:'100%'}} value={newPri} onChange={e=>setNewPri(e.target.value)}>
              <option value="high">Haute</option><option value="medium">Moyenne</option><option value="low">Basse</option>
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Projet</div>
            <input className="input" style={{width:'100%'}} placeholder="General" value={newProj} onChange={e=>setNewProj(e.target.value)}/>
          </div>
          <div className="mrow"><div className="mlbl">Recurrence</div>
            <select className="input" style={{width:'100%'}} value={newRecur} onChange={e=>setNewRecur(e.target.value)}>
              <option value="none">Unique</option><option value="daily">Quotidien</option><option value="weekly">Hebdomadaire</option><option value="monthly">Mensuel</option>
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Jour (optionnel)</div>
            <select className="input" style={{width:'100%'}} value={newTodoDay} onChange={e=>setNewTodoDay(e.target.value)}>
              <option value="">-- Aucun --</option>
              {FDAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
            </select>
          </div>
          {newTodoDay!==''&&(<>
          <div className="mrow"><div className="mlbl">Debut</div>
            <select className="input" style={{width:'100%'}} value={newTodoStart} onChange={e=>setNewTodoStart(e.target.value)}>
              <option value="">--</option>
              {TIMES.map(t=><option key={t.val} value={t.val}>{t.label}</option>)}
            </select>
          </div>
          <div className="mrow"><div className="mlbl">Fin</div>
            <select className="input" style={{width:'100%'}} value={newTodoEnd} onChange={e=>setNewTodoEnd(e.target.value)}>
              <option value="">--</option>
              {TIMES.map(t=><option key={t.val} value={t.val}>{t.label}</option>)}
            </select>
          </div>
          </>)}
        </div>
        {newTodoDay!==''&&newTodoStart!==''&&newTodoEnd!==''&&(
          <div className="alert alert-ok" style={{marginTop:8}}><span>&#10003;</span> Sera ajoutee au calendrier</div>
        )}
        <div className="mactions">
          <button className="btn" onClick={()=>setShowAddTodo(false)}>Annuler</button>
          <button className="btn btn-pr" onClick={()=>{if(newTodo.trim()){addTodo();setShowAddTodo(false);}}}>Ajouter</button>
        </div>
      </div>
    </div>)}

  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
